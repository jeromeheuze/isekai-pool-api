# isekai-pool.com — Nginx site config (merge into sites-available or include from main nginx.conf)
#
# Main site: static HTML under /web
# API: Laravel — document root MUST be api/public (never project root)
#
# After Certbot, duplicate the API server block for listen 443 ssl with certificate paths,
# or use certbot's include snippets. Keep the same location / and index.php blocks inside SSL.

server {
    listen 80;
    listen [::]:80;
    server_name isekai-pool.com www.isekai-pool.com;

    root /var/www/isekai-pool-api/web;
    index index.html;

    charset utf-8;

    # Homepage calls /api/v1/* here (same origin) → proxied to api vhost. Avoids browser CORS when
    # api.isekai-pool.com still sends duplicate Access-Control-Allow-Origin (nginx + Laravel).
    # Copy this block into the listen 443 ssl server_name for isekai-pool.com if Certbot split it.
    location /api/ {
        proxy_pass https://api.isekai-pool.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.isekai-pool.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    # text/html is compressed by default; listing it again triggers "duplicate MIME type text/html"
    gzip_types text/css application/javascript application/json;
}

# Laravel API — pattern matches https://laravel.com/docs/deployment#nginx
# (index.php-only FastCGI + error_page 404) so /api/v1/* reaches the front controller.
server {
    listen 80;
    listen [::]:80;
    server_name api.isekai-pool.com;

    root /var/www/isekai-pool-api/api/public;
    index index.php;

    charset utf-8;

    # CORS: set only in Laravel (config/cors.php). Nginx add_header here duplicates
    # Access-Control-Allow-Origin and browsers reject "*, *".

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types application/json text/plain;
}

# KOTO block explorer — same Laravel app as API (Blade under routes/web.php).
# DNS: A record explorer.isekai-pool.com → this host.
#
# Deploy: merge these server blocks into your real vhost file (e.g. sites-available/isekai-pool),
# not a new random filename. If that file is already linked from sites-enabled/, only
# `sudo nginx -t && sudo systemctl reload nginx` — do not run ln -sf …/your-file (placeholder).
#
# If `certbot --nginx` says it cannot find a matching server block, the explorer vhost was
# not installed on the server yet — add the port-80 block first, reload nginx, then either:
#   sudo certbot install --cert-name explorer.isekai-pool.com
# or paste the listen 443 block below (cert paths are already on disk after a successful issue).

server {
    listen 80;
    listen [::]:80;
    server_name explorer.isekai-pool.com;

    # Let’s Encrypt HTTP-01 (keep this if you add return 301 → HTTPS on port 80)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/isekai-pool-api/api/public;
        allow all;
    }

    root /var/www/isekai-pool-api/api/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/plain application/json;
}

# HTTPS — use after cert exists under /etc/letsencrypt/live/explorer.isekai-pool.com/
# Optional: in the port-80 server above, replace `location /` with:
#   return 301 https://$host$request_uri;
# but keep the /.well-known/acme-challenge/ location for renewals.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explorer.isekai-pool.com;

    ssl_certificate     /etc/letsencrypt/live/explorer.isekai-pool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.isekai-pool.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # If `nginx -t` fails on missing file, run: sudo certbot certificates (or omit next line)
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/isekai-pool-api/api/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/plain application/json;
}
