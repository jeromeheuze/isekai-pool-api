# isekai-pool.com — Nginx site config (merge into sites-available or include from main nginx.conf)
#
# Main site: static HTML under /web
# API: Laravel — document root MUST be api/public (never project root)
#
# After Certbot, duplicate the API server block for listen 443 ssl with certificate paths,
# or use certbot's include snippets. Keep the same location / and index.php blocks inside SSL.

server {
    listen 80;
    listen [::]:80;
    server_name isekai-pool.com www.isekai-pool.com;

    root /var/www/isekai-pool-api/web;
    index index.html;

    charset utf-8;

    # Homepage calls /api/v1/* here (same origin) → proxied to api vhost. Avoids browser CORS when
    # api.isekai-pool.com still sends duplicate Access-Control-Allow-Origin (nginx + Laravel).
    # Copy this block into the listen 443 ssl server_name for isekai-pool.com if Certbot split it.
    location /api/ {
        proxy_pass https://api.isekai-pool.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.isekai-pool.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}

# Laravel API — pattern matches https://laravel.com/docs/deployment#nginx
# (index.php-only FastCGI + error_page 404) so /api/v1/* reaches the front controller.
server {
    listen 80;
    listen [::]:80;
    server_name api.isekai-pool.com;

    root /var/www/isekai-pool-api/api/public;
    index index.php;

    charset utf-8;

    # CORS: set only in Laravel (config/cors.php). Nginx add_header here duplicates
    # Access-Control-Allow-Origin and browsers reject "*, *".

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types application/json text/plain;
}

# KOTO block explorer — same Laravel app as API (Blade under routes/web.php).
# DNS: A record explorer.isekai-pool.com → this host. SSL: certbot --nginx -d explorer.isekai-pool.com
server {
    listen 80;
    listen [::]:80;
    server_name explorer.isekai-pool.com;

    root /var/www/isekai-pool-api/api/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/html text/plain application/json;
}
