# Kotominer — electron-builder (see _docs/kotominer-electron-spec.md)
appId: com.isekai-pool.kotominer
productName: Kotominer
copyright: Copyright © isekai-pool.com

directories:
  output: release
  buildResources: build

files:
  - package.json
  - dist/**/*
  - src/main/**/*
  - src/preload/**/*

extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"

win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}

linux:
  target:
    - AppImage
    - deb
  artifactName: ${productName}-${version}.${ext}
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  - provider: github
    owner: jeromeheuze
    repo: kotominer
